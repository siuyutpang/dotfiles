import:
  - ~/.config/alacritty/themes/gruvbox_dark.yml

env:
  TERM: alacritty 

window:
  padding:
    x: 0
    y: 0
  title: alacritty 
  dynamic_title: true
  class:
    instance: Alacritty
    general: Alacritty
  dimensions:
    columns: 80
    lines: 24
  opacity: 0.8
  title: Scratchpad

font:
  normal:
    family: JetbrainsMono Nerd Font
    style: Regular
  bold:
    family: JetbrainsMono Nerd Font
    style: Bold
  italic:
    family: JetbrainsMono Nerd Font
    style: Italic
  bold_italic:
    family: JetbrainsMono Nerd Font
    style: Bold Italic
  size: 13

scrolling:
  history: 10000
  multiplier: 3

draw_bold_text_with_bright_colors: true

selection:
  save_to_clipboard: true

cursor:
  style:
    shape: Beam
    blinking: Off
  vi_mode_style: Block

live_config_reload: true

shell:
  program: /usr/bin/zsh

mouse:
  hide_when_typing: true

key_bindings:
  - { key: N, mods: Control, action: SpawnNewInstance }
